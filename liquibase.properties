# Configuración de Liquibase para PostgreSQL
# ============================================

# Driver JDBC
driver: org.postgresql.Driver

# URL de conexión a PostgreSQL
# Cambia estos valores según tu configuración local
url: jdbc:postgresql://localhost:5432/taskdb

# Credenciales de base de datos
username: postgres
password: password

# Archivo de cambios principal
changeLogFile: changelog.yml

# Configuración de logging
liquibase.hub.mode=off
liquibase.licenseKey=

# Configuración de classpath para drivers
classpath: DRIVERS/postgresql-42.7.10.jar

# Configuración de contexto por defecto
contexts: database-setup

# Configuración de etiquetas
labels:

# Configuración de rollback
rollback.count=1

# Configuración de salida
output.file.encoding=UTF-8
liquibase.output.line.separator=LF